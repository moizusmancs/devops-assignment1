services:
  app:
    image: node:20-alpine
    container_name: taskflow-jenkins-app
    working_dir: /app
    volumes:
      - .:/app                          # code mounted from Jenkins workspace
    command: >
      sh -c "npm install &&
             node src/config/setup.js;
             node src/index.js"
    ports:
      - "4000:3000"                     # different port from Part-I (3000)
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: taskflow-jenkins-db  # different name from Part-I
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_jenkins:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_jenkins:
